<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ApexClean Logo</title>
  <desc id="desc">Bright logo for ApexClean with high contrast for dark headers and footers.</desc>
  <defs>
    <linearGradient id="apexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60F5C2" />
      <stop offset="100%" stop-color="#12C48A" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7CF9D2" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect width="1200" height="360" fill="none" />

  <g transform="translate(60 48)" filter="url(#softGlow)">
    <path d="M112 8L220 292H170L145 224H80L55 292H4L112 8ZM112 85L95 136H129L112 85Z" fill="url(#apexGrad)" />
    <path d="M236 292L294 8H340L282 292H236Z" fill="#C9FFF0" opacity="0.35" />
  </g>

  <g transform="translate(360 104)">
    <text x="0" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#FFFFFF" letter-spacing="1">Apex</text>
    <text x="360" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#5AF2C2" letter-spacing="1">Clean</text>
    <text x="2" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#EFFFFA" letter-spacing="4">AirCert Tech & Safety LLC</text>
  </g>
</svg>
