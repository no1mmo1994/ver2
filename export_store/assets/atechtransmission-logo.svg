<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="360" viewBox="0 0 1320 360" role="img" aria-labelledby="title desc">
  <title id="title">AirCert Tech & Safety LLC Logo</title>
  <desc id="desc">High-contrast logo for AirCert Tech & Safety LLC with AT monogram and wordmark.</desc>
  <defs>
    <linearGradient id="techGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7EE8FA"/>
      <stop offset="100%" stop-color="#2BB3FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#76D6FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1320" height="360" fill="none"/>

  <g transform="translate(58 40)" filter="url(#glow)">
    <path d="M115 8L230 300H178L152 231H81L55 300H4L119 8ZM116 90L94 152H139L116 90Z" fill="url(#techGrad)"/>
    <rect x="238" y="8" width="46" height="292" rx="8" fill="#D8F2FF" opacity="0.32"/>
    <rect x="288" y="8" width="46" height="292" rx="8" fill="#A7E4FF" opacity="0.18"/>
  </g>

  <g transform="translate(390 102)">
    <text x="0" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="108" font-weight="800" fill="#FFFFFF" letter-spacing="1">ATech</text>
    <text x="350" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="108" font-weight="800" fill="#7ED8FF" letter-spacing="1">Transmission</text>
    <text x="2" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#EAF8FF" letter-spacing="4">AirCert Tech & Safety LLC</text>
  </g>
</svg>
